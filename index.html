<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Me Ensina AI · Propostas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0a0a0f;
    color: #f5f5f7;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 30% 20%, rgba(245, 158, 11, 0.12) 0%, transparent 50%),
      radial-gradient(circle at 70% 80%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
      #0a0a0f;
    padding: 32px;
    text-align: center;
  }
  .box { max-width: 520px; }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(245, 158, 11, 0.12);
    border: 1px solid rgba(245, 158, 11, 0.3);
    color: #f59e0b;
    padding: 8px 16px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .tag::before {
    content: '';
    width: 6px; height: 6px;
    background: #f59e0b;
    border-radius: 50%;
    box-shadow: 0 0 12px #f59e0b;
  }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin-bottom: 20px;
  }
  h1 .accent {
    background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p {
    color: #a1a1aa;
    font-size: 17px;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #f59e0b;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    padding: 14px 28px;
    border: 1px solid rgba(245, 158, 11, 0.3);
    border-radius: 100px;
    transition: all 0.2s;
  }
  a:hover {
    background: rgba(245, 158, 11, 0.12);
    transform: translateY(-2px);
  }
</style>
</head>
<body>
<div class="box">
  <div class="tag">Me Ensina AI</div>
  <h1>Sistema de <span class="accent">Propostas</span></h1>
  <p>Cada proposta tem um endereço exclusivo. Acesse pelo link que enviamos diretamente pra você.</p>
  <a href="https://meensinaai.com">Ir para meensinaai.com →</a>
</div>
</body>
</html>
